version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ngo-postgres
    environment:
      POSTGRES_USER: ngo_admin
      POSTGRES_PASSWORD: ngo_password
      POSTGRES_DB: ngo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ngo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
